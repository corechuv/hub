    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <script>
      (function () {
        var LANGUAGE_STORAGE_KEY = 'center-mira-language'
        var localeByLanguage = {
          en: 'en-US',
          de: 'de-DE',
          uk: 'uk-UA',
          ru: 'ru-RU',
        }
        var normalizeLanguageCode = function (value) {
          if (!value) return null
          var normalized = String(value).trim().toLowerCase().replace('_', '-')
          var base = normalized.split('-')[0]
          if (base === 'ua') return 'uk'
          if (base === 'en' || base === 'de' || base === 'uk' || base === 'ru') {
            return base
          }
          return null
        }

        try {
          var queryLanguage = normalizeLanguageCode(
            new URLSearchParams(window.location.search).get('lang')
          )
          var storedLanguage = normalizeLanguageCode(
            window.localStorage.getItem(LANGUAGE_STORAGE_KEY)
          )
          var nextLanguage = queryLanguage || storedLanguage || 'de'
          var locale = localeByLanguage[nextLanguage] || 'de-DE'

          document.documentElement.setAttribute('lang', locale)
          document.documentElement.setAttribute('xml:lang', locale)

          var contentLanguageMeta = document.querySelector('meta[name="content-language"]')
          if (contentLanguageMeta) {
            contentLanguageMeta.setAttribute('content', nextLanguage)
          }
        } catch (error) {
          document.documentElement.setAttribute('lang', 'de-DE')
          document.documentElement.setAttribute('xml:lang', 'de-DE')
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Center MiRA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
